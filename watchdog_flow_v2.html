<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SRF Postmortem — CSV 감시 → Grouper Flow (v2)</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0f172a;
    --fg: #e5e7eb;
    --muted: #a3adbd;
    --line: #94a3b8;
    --neutral: #334155;
    --input: #1d4ed8;
    --process: #4338ca;
    --storage: #0f766e;
    --external: #92400e;
    --risk: #991b1b;
    --ok: #166534;
    --highlight: #f59e0b;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main { max-width: 1200px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1.5; rx: 8; ry: 8; }
  .diamond { stroke: var(--line); stroke-width: 1.5; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .ok { fill: var(--ok); }
  .edge { stroke: var(--line); stroke-width: 2; fill: none; }
  .edge-thin { stroke: var(--line); stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
  .edge-red { stroke: #ef4444; stroke-width: 2; fill: none; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.5; }
</style>
<main>
<svg viewBox="0 0 1100 1750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/></marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
  </defs>

  <!-- 제목 -->
  <text x="550" y="30" text-anchor="middle" class="title">SRF Postmortem — CSV 감시 → Grouper Flow (v2)</text>
  <text x="550" y="52" text-anchor="middle" class="small">수정: 중복검사 제거 / 120초 미달성 fail / Beam 조건 3개 한꺼번에 체크</text>

  <!-- ────────── ── 대기(IDLE) 상태 ── -->
  <rect x="380" y="75" width="240" height="45" rx="25" class="node storage"/>
  <text x="500" y="101" text-anchor="middle" class="label">🔄 대기 상태 (IDLE)</text>
  <text x="500" y="115" text-anchor="middle" class="small">다음 CSV 감지 대기</text>

  <!-- ────────── ── ① WATCHDOG ── -->
  <rect x="40" y="145" width="1020" height="100" class="zone"/>
  <text x="60" y="168" class="label" fill="var(--muted)">① Watchdog 감지 (FileSystemEventHandler)</text>

  <path d="M500,120 V155 H220" class="edge" marker-end="url(#arrow)"/>

  <rect x="100" y="180" width="120" height="45" class="node input"/>
  <text x="160" y="206" text-anchor="middle" class="small">W:\ (scope1)</text>

  <rect x="300" y="180" width="120" height="45" class="node input"/>
  <text x="360" y="206" text-anchor="middle" class="small">X:\ (scope2)</text>

  <rect x="500" y="180" width="120" height="45" class="node input"/>
  <text x="560" y="206" text-anchor="middle" class="small">Y:\ (scope3)</text>

  <path d="M220,202 H300" class="edge" marker-end="url(#arrow)"/>
  <path d="M420,202 H500" class="edge" marker-end="url(#arrow)"/>

  <!-- csv_event_queue -->
  <path d="M160,225 V255 H500" class="edge" marker-end="url(#arrow)"/>
  <path d="M360,225 V255 H500" class="edge" marker-end="url(#arrow)"/>
  <path d="M560,225 V255 H500" class="edge" marker-end="url(#arrow)"/>

  <!-- ────────── ── ② 수집 단계 (120초 window) ── -->
  <rect x="40" y="265" width="1020" height="220" class="zone"/>
  <text x="60" y="288" class="label" fill="var(--muted)">② 수집 단계 (Queue Consumer — 120초 window)</text>

  <rect x="380" y="280" width="240" height="40" class="node storage"/>
  <text x="500" y="304" text-anchor="middle" class="label">csv_event_queue</text>
  <text x="500" y="318" text-anchor="middle" class="small">(중복검사 없음, 그냥 consume)</text>

  <path d="M500,262 V280" class="edge" marker-end="url(#arrow)"/>

  <!-- 수집 표시 -->
  <rect x="380" y="335" width="240" height="35" class="node process"/>
  <text x="500" y="353" text-anchor="middle" class="small">_pending[scope_idx] = csv_path</text>
  <text x="500" y="367" text-anchor="middle" class="small">→ "N/3 collected" 출력</text>

  <path d="M500,320 V335" class="edge" marker-end="url(#arrow)"/>

  <!-- 판정 -->
  <polygon points="500,395 560,420 500,445 440,420" class="diamond neutral"/>
  <text x="500" y="418" text-anchor="middle" class="small">3/3?</text>
  <text x="500" y="432" text-anchor="middle" class="small">or 120s?</text>

  <path d="M500,370 V395" class="edge" marker-end="url(#arrow)"/>

  <!-- 3/3 yes -->
  <path d="M560,420 H680" class="edge" stroke="#22c55e" marker-end="url(#arrow-green)"/>
  <text x="620" y="415" class="small" fill="#22c55e">✅ 3/3</text>

  <!-- 120s timeout -->
  <path d="M500,445 V480 H210 V455" class="edge-red" marker-end="url(#arrow-red)"/>
  <text x="380" y="470" class="small" fill="#ef4444">⏱ 120s 초과</text>

  <rect x="80" y="443" width="200" height="30" class="risk node"/>
  <text x="180" y="463" text-anchor="middle" class="small" fill="#fca5a5">⏱ FAIL: 120s timeout</text>

  <path d="M180,443 V100 H500" class="edge-red" marker-end="url(#arrow-red)"/>
  <text x="260" y="280" class="small" fill="#ef4444">→ IDLE 복귀</text>

  <!-- ────────── ── ③ 대기 및 Beam 체크 ── -->
  <rect x="40" y="505" width="1020" height="155" class="zone"/>
  <text x="60" y="528" class="label" fill="var(--muted)">③ 1분 대기 + Beam 일괄 체크</text>

  <path d="M680,420 V520" class="edge" marker-end="url(#arrow)"/>

  <!-- 1분 대기 -->
  <rect x="640" y="520" width="220" height="35" class="node ok"/>
  <text x="750" y="536" text-anchor="middle" class="small">⏳ 60s 대기 (파일 쓰기 완료)</text>
  <text x="750" y="550" text-anchor="middle" class="small">"Waiting for file writes..."</text>

  <path d="M750,555 V580" class="edge" marker-end="url(#arrow)"/>

  <!-- Beam 체크 (3개 한꺼번에) -->
  <polygon points="750,605 820,635 750,665 680,635" class="diamond neutral"/>
  <text x="750" y="630" text-anchor="middle" class="small">3개 CSV</text>
  <text x="750" y="644" text-anchor="middle" class="small">Beam ≥ 3V?</text>

  <!-- Beam fail -->
  <path d="M680,635 H550" class="edge-red" marker-end="url(#arrow-red)"/>
  <rect x="90" y="618" width="200" height="30" class="risk node"/>
  <text x="190" y="636" text-anchor="middle" class="small" fill="#fca5a5">⛔ FAIL: Low Beam Current</text>
  <text x="190" y="650" text-anchor="middle" class="small" fill="#fca5a5">(어느 scope가 low인지 출력)</text>

  <path d="M190,648 V100 H500" class="edge-red" marker-end="url(#arrow-red)"/>
  <text x="350" y="380" class="small" fill="#ef4444">→ IDLE 복귀</text>

  <!-- ────────── ── ④ CSV 개별 처리 ── -->
  <rect x="40" y="680" width="1020" height="255" class="zone"/>
  <text x="60" y="703" class="label" fill="var(--muted)">④ CSV 개별 처리 (scope1 → scope2 → scope3 순차)</text>

  <path d="M820,635 H900" class="edge" marker-end="url(#arrow)"/>

  <!-- scope1 -->
  <rect x="80" y="720" width="280" height="55" class="node process"/>
  <text x="220" y="740" text-anchor="middle" class="label">(scope1) 처리</text>
  <text x="220" y="758" text-anchor="middle" class="small">parquet 변환 + 그래프 생성 + 메시지 출력</text>

  <path d="M360,747 H420" class="edge" marker-end="url(#arrow)"/>

  <!-- 2초 대기 -->
  <rect x="420" y="732" width="80" height="30" class="node ok"/>
  <text x="460" y="751" text-anchor="middle" class="small">2s</text>

  <path d="M500,747 H540" class="edge" marker-end="url(#arrow)"/>

  <!-- scope2 -->
  <rect x="540" y="720" width="280" height="55" class="node process"/>
  <text x="680" y="740" text-anchor="middle" class="label">(scope2) 처리</text>
  <text x="680" y="758" text-anchor="middle" class="small">parquet 변환 + 그래프 생성 + 메시지 출력</text>

  <path d="M820,747 H870" class="edge" marker-end="url(#arrow)"/>

  <!-- 2초 대기 -->
  <rect x="870" y="732" width="80" height="30" class="node ok"/>
  <text x="910" y="751" text-anchor="middle" class="small">2s</text>

  <path d="M910,747 V795 H90" class="edge" marker-end="url(#arrow)"/>

  <!-- scope3 -->
  <rect x="80" y="800" width="280" height="55" class="node process"/>
  <text x="220" y="820" text-anchor="middle" class="label">(scope3) 처리</text>
  <text x="220" y="838" text-anchor="middle" class="small">parquet 변환 + 그래프 생성 + 메시지 출력</text>

  <!-- fail path: 개별 CSV 처리 실패 -->
  <path d="M220,775 V800" class="edge" marker-end="url(#arrow)"/>
  <path d="M220,855 V890 H190" class="edge-red" marker-end="url(#arrow-red)"/>
  <text x="230" y="875" class="small" fill="#ef4444">fail</text>

  <rect x="60" y="890" width="200" height="30" class="risk node"/>
  <text x="160" y="908" text-anchor="middle" class="small" fill="#fca5a5">✗ FAIL: preprocessor error</text>

  <path d="M160,920 V100 H500" class="edge-red" marker-end="url(#arrow-red)"/>

  <!-- ────────── ── ⑤ 3 parquet 확인 ── -->
  <rect x="40" y="955" width="1020" height="130" class="zone"/>
  <text x="60" y="978" class="label" fill="var(--muted)">⑤ 3 scope parquet 확인</text>

  <path d="M360,827 H440" class="edge" marker-end="url(#arrow)"/>

  <!-- 2초 대기 -->
  <rect x="440" y="812" width="80" height="30" class="node ok"/>
  <text x="480" y="831" text-anchor="middle" class="small">2s</text>

  <path d="M480,827 V990 H600" class="edge" marker-end="url(#arrow)"/>

  <polygon points="600,990 670,1020 600,1050 530,1020" class="diamond neutral"/>
  <text x="600" y="1015" text-anchor="middle" class="small">3 scope</text>
  <text x="600" y="1029" text-anchor="middle" class="small">parquet ready?</text>

  <!-- No: fail -->
  <path d="M530,1020 H400" class="edge-red" marker-end="url(#arrow-red)"/>
  <rect x="80" y="1005" width="200" height="30" class="risk node"/>
  <text x="180" y="1023" text-anchor="middle" class="small" fill="#fca5a5">✗ FAIL: parquet incomplete</text>

  <path d="M180,1035 V100 H500" class="edge-red" marker-end="url(#arrow-red)"/>

  <!-- ────────── ── ⑥ Grouper → Pipeline ── -->
  <rect x="40" y="1105" width="1020" height="230" class="zone"/>
  <text x="60" y="1128" class="label" fill="var(--muted)">⑥ Grouper → 이후 Pipeline (각 단계 메시지 출력)</text>

  <path d="M670,1020 H780" class="edge" marker-end="url(#arrow)"/>

  <rect x="780" y="1130" width="200" height="40" class="node process"/>
  <text x="880" y="1150" text-anchor="middle" class="label">Grouper 실행</text>
  <text x="880" y="1164" text-anchor="middle" class="small">"Running grouper..."</text>

  <path d="M880,1170 V1190" class="edge" marker-end="url(#arrow)"/>

  <rect x="780" y="1190" width="200" height="35" class="node process"/>
  <text x="880" y="1211" text-anchor="middle" class="small">merged/temp/ → merged/ 이동</text>

  <path d="M880,1225 V1250" class="edge" marker-end="url(#arrow)"/>

  <rect x="780" y="1250" width="200" height="35" class="node process"/>
  <text x="880" y="1271" text-anchor="middle" class="small">Classifier / Visualizer / Reporter</text>

  <path d="M880,1285 V1310" class="edge" marker-end="url(#arrow)"/>

  <rect x="780" y="1310" width="200" height="35" class="node process"/>
  <text x="880" y="1331" text-anchor="middle" class="small">Email Sender / DB Import</text>

  <!-- ────────── ── 완료 → IDLE ── -->
  <path d="M880,1345 V1390 H500 V130" class="edge" stroke="#22c55e" marker-end="url(#arrow-green)"/>
  <text x="700" y="1380" class="small" fill="#22c55e">✅ 완료 → IDLE 복귀</text>
  <text x="700" y="1395" class="small" fill="#22c55e">(다음 이벤트 대기)</text>

  <!-- ────────── ── 범례 ── -->
  <rect x="40" y="1430" width="1020" height="110" class="zone"/>
  <text x="60" y="1453" class="label">범례</text>
  <rect x="60" y="1465" width="16" height="16" class="input"/>
  <text x="85" y="1478" class="small">입력 (Watch Folder)</text>
  <rect x="240" y="1465" width="16" height="16" class="process"/>
  <text x="265" y="1478" class="small">처리</text>
  <rect x="400" y="1465" width="16" height="16" class="storage"/>
  <text x="425" y="1478" class="small">Queue / 대기상태</text>
  <rect x="590" y="1465" width="16" height="16" class="diamond neutral"/>
  <text x="615" y="1478" class="small">조건 판정</text>
  <rect x="760" y="1465" width="16" height="16" class="risk"/>
  <text x="785" y="1478" class="small">오류 / Fail → IDLE 복귀</text>
  <rect x="940" y="1465" width="16" height="16" class="ok"/>
  <text x="965" y="1478" class="small">성공 → 다음 단계</text>
  <line x1="60" y1="1505" x2="100" y2="1505" stroke="#ef4444" stroke-width="2"/>
  <text x="110" y="1509" class="small" fill="#ef4444">Fail 경로 (→ IDLE)</text>
  <line x1="300" y1="1505" x2="340" y2="1505" stroke="#22c55e" stroke-width="2"/>
  <text x="350" y="1509" class="small" fill="#22c55e">성공 경로</text>
</svg>
</main>
</html>
