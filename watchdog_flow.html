<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SRF Postmortem — CSV 감시 → Grouper Flow</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f8fafc;
    --fg: #172033;
    --muted: #5b6475;
    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --highlight: #fbbf24;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
      --highlight: #f59e0b;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main { max-width: 1200px; margin: 32px auto; padding: 0 20px; }
  svg { width: 100%; height: auto; display: block; }
  .title { font-size: 20px; font-weight: 650; fill: var(--fg); }
  .label { font-size: 13px; font-weight: 600; fill: var(--fg); }
  .small { font-size: 11px; fill: var(--muted); }
  .node { stroke: var(--line); stroke-width: 1.5; rx: 8; ry: 8; }
  .neutral { fill: var(--neutral); }
  .input { fill: var(--input); }
  .process { fill: var(--process); }
  .storage { fill: var(--storage); }
  .external { fill: var(--external); }
  .risk { fill: var(--risk); }
  .highlight { fill: var(--highlight); }
  .edge { stroke: var(--line); stroke-width: 2; fill: none; }
  .edge-thin { stroke: var(--line); stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
  .zone { fill: none; stroke: var(--line); stroke-width: 1; stroke-dasharray: 6 5; opacity: 0.7; }
  .decision { fill: var(--external); stroke: var(--line); stroke-width: 1.5; }
  .problem { fill: var(--risk); stroke: var(--line); stroke-width: 1.5; }
  .ok { fill: #bbf7d0; stroke: #16a34a; stroke-width: 1.5; }
</style>
<main>
<svg viewBox="0 0 1100 1570" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="var(--line)"/></marker>
    <marker id="arrow-danger" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>

  <!-- 제목 -->
  <text x="550" y="30" text-anchor="middle" class="title">SRF Postmortem — CSV 감시 → Grouper Flow</text>
  <text x="550" y="52" text-anchor="middle" class="small">(현재 pipeline_manager._full_worker() 기준)</text>

  <!-- ────────── 구역: WATCHDOG ────────── -->
  <rect x="30" y="75" width="1040" height="240" class="zone"/>
  <text x="50" y="98" class="label" fill="var(--muted)">① WATCHDOG 감지 (FileSystemEventHandler: on_created/on_modified)</text>

  <!-- W:\, X:\, Y:\ -->
  <rect x="60" y="115" width="160" height="55" class="node input"/>
  <text x="140" y="144" text-anchor="middle" class="label">W:\ (scope1)</text>
  <text x="140" y="161" text-anchor="middle" class="small">tek1043.csv</text>

  <rect x="290" y="115" width="160" height="55" class="node input"/>
  <text x="370" y="144" text-anchor="middle" class="label">X:\ (scope2)</text>
  <text x="370" y="161" text-anchor="middle" class="small">tek1059.csv</text>

  <rect x="520" y="115" width="160" height="55" class="node input"/>
  <text x="600" y="144" text-anchor="middle" class="label">Y:\ (scope3)</text>
  <text x="600" y="161" text-anchor="middle" class="small">tek1045.csv</text>

  <!-- watch event arrow -->
  <path d="M140,170 V200" class="edge" marker-end="url(#arrow)"/>
  <path d="M370,170 V200" class="edge" marker-end="url(#arrow)"/>
  <path d="M600,170 V200" class="edge" marker-end="url(#arrow)"/>

  <!-- csv_event_queue -->
  <rect x="290" y="210" width="240" height="45" class="node storage"/>
  <text x="410" y="233" text-anchor="middle" class="label">csv_event_queue</text>
  <text x="410" y="249" text-anchor="middle" class="small">(thread-safe Queue)</text>

  <!-- dup check -->
  <rect x="290" y="278" width="240" height="30" class="node decision"/>
  <text x="410" y="297" text-anchor="middle" class="small">중복 검사 (_processed_watchdog)</text>

  <path d="M410,255 V278" class="edge" marker-end="url(#arrow)"/>

  <!-- ────────── 구역: CSV 수집 ────────── -->
  <rect x="30" y="335" width="1040" height="370" class="zone"/>
  <text x="50" y="358" class="label" fill="var(--muted)">② CSV 수집 &amp; 대기 (Queue Consumer Thread — _full_worker)</text>

  <!-- 수집 -->
  <rect x="100" y="375" width="220" height="50" class="node process"/>
  <text x="210" y="399" text-anchor="middle" class="label">_pending_scopes[scope_idx] 저장</text>
  <text x="210" y="415" text-anchor="middle" class="small">"CSV arrived: scopeN — N/3 collected"</text>

  <path d="M410,308 V365 H315" class="edge" marker-end="url(#arrow)"/>

  <!-- 판정: 3/3? -->
  <polygon points="490,400 550,370 610,400 550,430" class="decision"/>
  <text x="550" y="402" text-anchor="middle" class="small">3/3 collected?</text>

  <path d="M320,400 H490" class="edge" marker-end="url(#arrow)"/>

  <!-- No: 타임아웃 체크 루프 -->
  <path d="M550,430 V465 H350 V465" class="edge-thin" marker-end="url(#arrow)"/>
  <rect x="220" y="452" width="260" height="35" class="node problem"/>
  <text x="350" y="470" text-anchor="middle" class="small">⏱ 120s 타임아웃 체크 (elapsed)</text>
  <text x="350" y="483" text-anchor="middle" class="small">→ Timeout: processing what we have</text>

  <path d="M350,487 V535 H490" class="edge-thin" marker-end="url(#arrow)"/>

  <!-- Edge case ellipse -->
  <rect x="680" y="375" width="280" height="50" class="node problem"/>
  <text x="820" y="396" text-anchor="middle" class="label">⚠️ 같은 file → 다른 scope로 재등장</text>
  <text x="820" y="412" text-anchor="middle" class="small">중복 제거로 scope 인덱스가 밀림</text>

  <path d="M610,400 H680" class="edge" stroke="#dc2626" marker-end="url(#arrow-danger)"/>

  <!-- Yes: 60s 대기 -->
  <path d="M550,370 V545" class="edge" marker-end="url(#arrow)"/>
  <rect x="430" y="545" width="240" height="35" class="node ok"/>
  <text x="550" y="563" text-anchor="middle" class="small">✅ All 3 collected! Wait 60s</text>
  <text x="550" y="576" text-anchor="middle" class="small">"Waiting for file writes to complete..."</text>

  <!-- ────────── 구역: CSV 처리 ────────── -->
  <rect x="30" y="725" width="1040" height="370" class="zone"/>
  <text x="50" y="748" class="label" fill="var(--muted)">③ CSV 개별 처리 (루프: sorted(_pending_scopes.items()))</text>

  <path d="M550,580 V705" class="edge" marker-end="url(#arrow)"/>

  <!-- Read check -->
  <polygon points="140,755 200,725 260,755 200,785" class="decision"/>
  <text x="200" y="753" text-anchor="middle" class="small">읽기 가능?</text>

  <path d="M200,725 V715 H90 V715 V725" class="edge" marker-end="url(#arrow)"/>

  <!-- Yes -->
  <path d="M248,760 H340" class="edge" marker-end="url(#arrow)"/>

  <!-- Beam check -->
  <polygon points="340,748 400,718 460,748 400,778" class="decision"/>
  <text x="400" y="745" text-anchor="middle" class="small">Beam ≥ 3V?</text>
  <text x="400" y="758" text-anchor="middle" class="small">(beam low check)</text>

  <!-- No beam -> skip -->
  <path d="M400,778 V820 H200 V790" class="edge-thin" marker-end="url(#arrow)"/>
  <rect x="30" y="810" width="260" height="30" class="node risk"/>
  <text x="160" y="830" text-anchor="middle" class="small">⛔ Beam low, skip: xxx.csv</text>

  <!-- Yes beam: 그래프 생성 -->
  <path d="M448,748 H560" class="edge" marker-end="url(#arrow)"/>
  <rect x="560" y="738" width="220" height="40" class="node process"/>
  <text x="670" y="758" text-anchor="middle" class="small">그래프 2개 생성</text>
  <text x="670" y="772" text-anchor="middle" class="small">(wide + narrow, dark mode)</text>

  <!-- Parquet 변환 -->
  <path d="M670,778 V820" class="edge" marker-end="url(#arrow)"/>
  <rect x="550" y="820" width="240" height="40" class="node process"/>
  <text x="670" y="840" text-anchor="middle" class="small">Parquet 변환 (preprocessor)</text>
  <text x="670" y="854" text-anchor="middle" class="small">→ processed/scope{N}/</text>

  <!-- Fail branch -->
  <path d="M400,745 H340" class="edge-thin" marker-end="url(#arrow)"/>
  <rect x="80" y="858" width="200" height="30" class="node risk"/>
  <text x="180" y="878" text-anchor="middle" class="small">✗ parquet fail: ...</text>

  <path d="M180,888 V920 H550" class="edge-thin" marker-end="url(#arrow)"/>

  <!-- ────────── 구역: GROUPER ────────── -->
  <rect x="30" y="1115" width="1040" height="190" class="zone"/>
  <text x="50" y="1138" class="label" fill="var(--muted)">④ 3스코프 모두 처리 → Grouper (Pipeline)</text>

  <path d="M670,860 V900 H350 V900 H350" class="edge-thin"/>
  <path d="M350,900 V1090" class="edge" marker-end="url(#arrow)"/>

  <!-- 3개 scope parquet 판정 -->
  <polygon points="350,1050 420,1020 490,1050 420,1080" class="decision"/>
  <text x="420" y="1062" text-anchor="middle" class="small">3 scope parquet?</text>

  <path d="M420,1020 V1010 H350 V1000" class="edge-thin" marker-end="url(#arrow)"/>

  <!-- Yes -->
  <path d="M490,1050 H600" class="edge" marker-end="url(#arrow)"/>

  <rect x="600" y="1140" width="220" height="40" class="node process"/>
  <text x="710" y="1160" text-anchor="middle" class="label">Grouper.run()</text>
  <text x="710" y="1174" text-anchor="middle" class="small">timestamp window matching</text>

  <!-- Grouper match -->
  <polygon points="600,1130 600,1100 490,1100" class="edge-thin"/>

  <rect x="600" y="1195" width="220" height="35" class="node process"/>
  <text x="710" y="1215" text-anchor="middle" class="small">merged/temp/에 배치 후</text>
  <text x="710" y="1229" text-anchor="middle" class="small">→ merged/로 이동</text>

  <path d="M710,1180 V1195" class="edge" marker-end="url(#arrow)"/>

  <!-- 이후 pipeline -->
  <path d="M710,1230 V1255" class="edge" marker-end="url(#arrow)"/>
  <rect x="840" y="1140" width="180" height="150" class="node external"/>
  <text x="930" y="1160" text-anchor="middle" class="label">이후 Pipeline</text>
  <text x="930" y="1178" text-anchor="middle" class="small">Classifier</text>
  <text x="930" y="1195" text-anchor="middle" class="small">Visualizer</text>
  <text x="930" y="1212" text-anchor="middle" class="small">Reporter</text>
  <text x="930" y="1229" text-anchor="middle" class="small">Email Sender</text>
  <text x="930" y="1246" text-anchor="middle" class="small">DB Import</text>

  <path d="M820,1215 H840" class="edge" marker-end="url(#arrow)"/>

  <!-- ────────── 범례 ────────── -->
  <rect x="30" y="1325" width="1040" height="110" class="zone"/>
  <text x="50" y="1348" class="label">범례</text>
  <rect x="50" y="1360" width="16" height="16" class="input"/>
  <text x="75" y="1373" class="small">입력 (Watch Folder)</text>
  <rect x="220" y="1360" width="16" height="16" class="process"/>
  <text x="245" y="1373" class="small">처리</text>
  <rect x="370" y="1360" width="16" height="16" class="storage"/>
  <text x="395" y="1373" class="small">Queue / 저장소</text>
  <rect x="540" y="1360" width="16" height="16" class="decision"/>
  <text x="565" y="1373" class="small">조건 판정</text>
  <rect x="700" y="1360" width="16" height="16" class="risk"/>
  <text x="725" y="1373" class="small">오류 / Skip</text>
  <rect x="860" y="1360" width="16" height="16" class="ok"/>
  <text x="885" y="1373" class="small">성공</text>
  <line x1="50" y1="1400" x2="90" y2="1400" stroke="#dc2626" stroke-width="2"/>
  <text x="100" y="1404" class="small">현재 문제가 발생하는 경로</text>
</svg>
</main>
</html>
